services:
  frontproxy:
    build:
      context: frontproxy
    ports:
      - '8000:8000'
    depends_on:
      - alloy
      - frontend
    volumes:
      - ./frontproxy/nginx.conf:/etc/nginx/nginx.conf

  frontend:
    build: frontend
    environment:
      - PORT=8001
    ports:
      - "8001:8001"
    depends_on:
      - products

  products:
    build:
     context: products
    ports:
      - '8002:8002'
    volumes:
      - ./products/app.py:/app/app.py
    depends_on:
      - redis

  checkout:
    build:
      context: checkout
    ports:
      - '8003:8003'

  redis:
     image: redis:alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
     ports:
       - '6379:6379'

  alloy:
    image: grafana/alloy@sha256:4f6ddc56ffdcf8a6316748fc5162972e20cb301523cac1bb4a31957df733ae9b
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "--storage.path=/var/lib/alloy/data", "/etc/alloy/config.alloy"]
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
    ports:
      - '12345:12345'

  load:
    build:
      context: load
      dockerfile: Dockerfile
    volumes:
      - ./load/script.js:/etc/script.js
    command: run /etc/script.js
    restart: always
    depends_on:
      frontproxy:
        condition: service_started
